<!-- public/diagnose.html -->
<!DOCTYPE html>
<html>
<head>
    <title>静态文件诊断</title>
</head>
<body>
    <h1>静态文件访问诊断</h1>
    
    <h2>测试1: 直接图片访问</h2>
    <div>
        <p>剖面图:</p>
        <img src="./观察点文档/6.24许堡东疙瘩/观察点1 剖面图.jpg" 
             onerror="this.alt='加载失败'" 
             onload="this.alt='加载成功'">
        <p>实地图片:</p>
        <img src="./观察点文档/6.24许堡东疙瘩/观察点1 图片.jpg"
             onerror="this.alt='加载失败'" 
             onload="this.alt='加载成功'">
    </div>

    <h2>测试2: 文件存在性检查</h2>
    <div id="fileCheck"></div>

    <script>
        const files = [
            './观察点文档/6.24许堡东疙瘩/观察点1 剖面图.jpg',
            './观察点文档/6.24许堡东疙瘩/观察点1 图片.jpg',
            './观察点文档/6.24许堡东疙瘩/观察点1 知识点.txt',
            './vite.svg'  // 这个应该能访问
        ];

        files.forEach(async (file) => {
            try {
                const response = await fetch(file);
                const div = document.createElement('div');
                div.innerHTML = `${file}: ${response.status} - ${response.statusText}`;
                document.getElementById('fileCheck').appendChild(div);
            } catch (error) {
                const div = document.createElement('div');
                div.innerHTML = `${file}: ERROR - ${error.message}`;
                document.getElementById('fileCheck').appendChild(div);
            }
        });
    </script>
</body>
</html>
